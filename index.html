<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Smart Grocery Reminder</title>

    <style>
        body { font-family: Arial; background: #f2f2f2; display: flex;
               justify-content: center; align-items: center; height: 100vh; }
        #box {
            background: white; padding: 20px; border-radius: 10px; width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }
        input { width: 90%; padding: 8px; margin: 10px; }
        button { padding: 8px 20px; }
    </style>
</head>

<body>
<div id="box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="doLogin()">Login</button>
</div>

<script>
    async function doLogin() {
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value.trim();

        if (!user || !pass) {
            alert("Please enter username & password");
            return;
        }

        const res = await fetch("http://localhost:5000/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass })
        });

        const data = await res.json();

        if (data.success) {
            localStorage.setItem("token", data.token);
            window.location.href = "grocery.html";   // only once – no loop
        } else {
            alert("Invalid login!");
        }
    }
</script>

</body>
</html>
